<!DOCTYPE html>

<head>

<style>

    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);

    text-align: center;
}

.container {
    margin-top: 60px;
}

h1 {
    font-size: 32px;

.btn:hover {

.instagram { background: #E1306C; }
.tiktok { background: black; }
.youtube { background: red; }
.facebook { background: #1877F2; }

    <a href="https://instagram.com/irgenbushiib" class="btn instagram">Instagram</a>
    <a href="https://tiktok.com/@irgenbushiig" class="btn tiktok">TikTok</a>
    <a href="https://youtube.com/@irgenbushiig" class="btn youtube">YouTube</a>
    <a href="#" class="btn facebook">Facebook</a>

</html>
